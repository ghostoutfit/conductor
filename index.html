<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conductor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ui-bg:      rgba(8, 6, 24, 0.78);
  --ui-border:  rgba(255,255,255,0.07);
  --text-dim:   rgba(220,215,255,0.48);
  --text-bright:rgba(240,235,255,0.92);
}

body {
  background: #05040f;
  font-family: 'Lexend', sans-serif;
  overflow: hidden;
  width: 100vw; height: 100vh;
}

#canvas { position: fixed; top: 0; left: 0; display: block; }

#toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 24px;
  background: var(--ui-bg);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--ui-border);
}

.mode-btn {
  font-family: 'Lexend', sans-serif; font-size: 12.5px; font-weight: 500;
  letter-spacing: 0.04em; padding: 6px 17px; border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.04);
  color: var(--text-dim); cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  user-select: none; white-space: nowrap; line-height: 1;
}
.mode-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-bright); border-color: rgba(255,255,255,0.18); }

.mode-btn.active[data-mode="copper"]  { border-color: #d4782a; color: #e8a060; background: rgba(212,120,42,0.15); }
.mode-btn.active[data-mode="tin"]     { border-color: #8899bb; color: #aabbd8; background: rgba(136,153,187,0.15); }
.mode-btn.active[data-mode="nacl"]    { border-color: #ffaa30; color: #ffc870; background: rgba(255,170,48,0.15); }
.mode-btn.active[data-mode="sncl2"]   { border-color: #22ccaa; color: #55dfc0; background: rgba(34,204,170,0.15); }
.mode-btn.active[data-mode="water"]   { border-color: #5ab0e0; color: #80ccf0; background: rgba(90,176,224,0.15); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="toolbar">
  <button class="mode-btn active" data-mode="copper">Copper</button>
  <button class="mode-btn"        data-mode="tin">Tin</button>
  <button class="mode-btn"        data-mode="nacl">NaCl (aq)</button>
  <button class="mode-btn"        data-mode="sncl2">SnCl₂ (aq)</button>
  <button class="mode-btn"        data-mode="water">Pure H₂O</button>
</div>

<script>
// ─── Canvas & resize ──────────────────────────────────────────────────────────
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const toolbar = document.getElementById('toolbar');
let W, H, toolH;

function resize() {
  W     = canvas.width  = window.innerWidth;
  H     = canvas.height = window.innerHeight;
  toolH = toolbar.offsetHeight;
}

// ─── Layout constants ─────────────────────────────────────────────────────────
const POWER_H    = 160;   // px reserved at bottom for power supply
const ELEC_DEPTH = 80;    // px electrodes protrude from each wall

// Container bounds
const contTop  = () => toolH;
const contBot  = () => H - POWER_H;
const contH    = () => contBot() - contTop();

// Metal band (conducting material for Cu/Sn — half total container height, centered)
const metalTop = () => contTop() + contH() * 0.25;
const metalBot = () => contTop() + contH() * 0.75;
const metalMid = () => (metalTop() + metalBot()) / 2;

// Power supply rect
function psRect() {
  const pw = Math.min(340, W * 0.38);
  const ph = POWER_H - 28;
  return { x: W / 2 - pw / 2, y: H - POWER_H + 14, w: pw, h: ph };
}
const DIAL_R   = 32;
const dialCX   = () => W / 2;
const dialCY   = () => H - POWER_H + POWER_H * 0.44;

// ─── Voltage / current ────────────────────────────────────────────────────────
let voltage = 5.0;
const V_MIN = 0.5, V_MAX = 24.0;
const RESISTANCE = { copper: 2.5, tin: 3.5, nacl: 10, sncl2: 13, water: 5000 };
const BASE_E_PER_V = 0.0026;   // at 5 V → 0.013 per unit charge per frame

function eStrength() { return voltage * BASE_E_PER_V; }
function getCurrent() { return voltage / RESISTANCE[currentMode]; }
function fmtCurrent(A) {
  if (A < 0.001) return (A * 1e6).toFixed(0) + ' µA';
  if (A < 0.1)   return (A * 1000).toFixed(1) + ' mA';
  return A.toFixed(3) + ' A';
}

// ─── Physics constants ────────────────────────────────────────────────────────
const T_ELECTRON  = 0.38;
const T_ION       = 0.26;
const T_WATER     = 0.09;
const T_LATTICE   = 0.042;
const DAMP        = 0.91;
const RESTORE_K   = 0.08;
const WATER_EFAC  = 0.028;
const ALPHA_MIN   = 0.07;
const ALPHA_MAX   = 1.0;

// ─── Particle type definitions ────────────────────────────────────────────────
// electrons are YELLOW; orbs = valence electron count on the ion
const PTYPES = {
  electron: { r: 2,  charge: -1, hex: '#ffee00', label: '',      thermal: T_ELECTRON, orbs: 0 },
  cu:       { r: 13, charge:  0, hex: '#c8682a', label: 'Cu',    thermal: T_LATTICE,  orbs: 0 },
  sn_metal: { r: 13, charge:  0, hex: '#8899bb', label: 'Sn',    thermal: T_LATTICE,  orbs: 0 },
  na_plus:  { r: 9,  charge: +1, hex: '#ffaa30', label: 'Na⁺',  thermal: T_ION,      orbs: 8 },  // [Ne] outer shell
  cl_minus: { r: 9,  charge: -1, hex: '#88dd33', label: 'Cl⁻',  thermal: T_ION,      orbs: 8 },  // [Ar] outer shell
  sn_plus:  { r: 10, charge: +2, hex: '#22ccaa', label: 'Sn²⁺', thermal: T_ION,      orbs: 2 },  // 5s² remaining
  water:    { r: 8,  charge:  0, hex: null,       label: 'H₂O',  thermal: T_WATER,    orbs: 0 },
  h_plus:   { r: 5,  charge: +1, hex: '#ff8844', label: 'H⁺',   thermal: T_ION,      orbs: 0 },
  oh_minus: { r: 5,  charge: -1, hex: '#9966ff', label: 'OH⁻',  thermal: T_ION,      orbs: 6 },  // O valence electrons
};

// Orbital radius (electron orbit distance from ion center)
const ORB_R = { na_plus: 18, cl_minus: 18, sn_plus: 16, oh_minus: 13 };

// ─── State ────────────────────────────────────────────────────────────────────
let particles   = [];
let currentMode = 'copper';

function isMetal() { return currentMode === 'copper' || currentMode === 'tin'; }

// ─── Particle helpers ─────────────────────────────────────────────────────────
function spawnPos() {
  const margin = 18;
  const xMin = ELEC_DEPTH + margin, xMax = W - ELEC_DEPTH - margin;
  const yMin = (isMetal() ? metalTop() : contTop()) + margin;
  const yMax = (isMetal() ? metalBot() : contBot()) - margin;
  return { x: xMin + Math.random() * (xMax - xMin), y: yMin + Math.random() * (yMax - yMin) };
}

function makeOrbitals(type) {
  const n = PTYPES[type].orbs;
  if (!n) return [];
  const r = ORB_R[type] || 14;
  return Array.from({ length: n }, () => {
    // Random point on unit sphere
    const phi   = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const nx = Math.sin(phi) * Math.cos(theta);
    const ny = Math.sin(phi) * Math.sin(theta);
    const nz = Math.cos(phi);
    // Random tangential velocity direction
    let tx = Math.random() - 0.5, ty = Math.random() - 0.5, tz = Math.random() - 0.5;
    const d = tx*nx + ty*ny + tz*nz;
    tx -= d*nx; ty -= d*ny; tz -= d*nz;
    let tLen = Math.sqrt(tx*tx + ty*ty + tz*tz) || 1;
    const speed = 0.30 + Math.random() * 0.15;
    tx = tx/tLen * speed; ty = ty/tLen * speed; tz = tz/tLen * speed;
    return { nx, ny, nz, tx, ty, tz, speed, r };
  });
}

function makeParticle(type, x, y, fixed) {
  const d = PTYPES[type];
  return {
    type, x, y, vx: 0, vy: 0,
    r: d.r, charge: d.charge, thermal: d.thermal,
    fixed: !!fixed, homeX: x, homeY: y,
    alpha:  0.28 + Math.random() * 0.72,
    scale:  1.0,
    // electrons drift depth slowly (they're the only moving layer in metal modes)
    dAlpha: (Math.random() < 0.5 ? 1 : -1) * (type === 'electron'
      ? 0.0008 + Math.random() * 0.0012
      : 0.003  + Math.random() * 0.004),
    orbitals: makeOrbitals(type),
  };
}

function respawn(p) {
  const pos = spawnPos();
  p.x = pos.x; p.y = pos.y; p.vx = 0; p.vy = 0;

  if (p.type === 'electron') {
    // Electrons drift left → respawn on the right to keep density uniform.
    // Bias x into the right 40% of the inter-electrode space.
    const margin = 18;
    const xMin = ELEC_DEPTH + margin, xMax = W - ELEC_DEPTH - margin;
    p.x = xMax - Math.random() * (xMax - xMin) * 0.40;
    // Keep current drifting alpha — no ghost-in snap for electrons
    return;
  }

  // Solution particles ghost in from the back
  p.alpha  = ALPHA_MIN + Math.random() * 0.06;
  p.dAlpha = Math.abs(p.dAlpha);
}

function generateLattice(type, count) {
  const xMin = ELEC_DEPTH + 14, xMax = W - ELEC_DEPTH - 14;
  const yMin = metalTop() + 14,  yMax = metalBot() - 14;
  const w = xMax - xMin, h = yMax - yMin;

  // FCC-style depth layers:
  //   front & back share the same grid; middle is offset by half a cell in x and y
  //   (the face-center layer that sits in the holes between front/back atoms)
  const layerDefs = [
    { alpha: 1.00, scale: 1.00, ox: 0.0, oy: 0.0 },  // front  — full size, opaque
    { alpha: 0.50, scale: 0.82, ox: 0.5, oy: 0.5 },  // middle — half-cell stagger
    { alpha: 0.17, scale: 0.65, ox: 0.0, oy: 0.0 },  // back   — small & dim
  ];

  const perLayer = Math.round(count / 3);
  const cols = Math.max(3, Math.round(Math.sqrt(perLayer * w / h)));
  const rows = Math.max(2, Math.round(perLayer / cols));
  const cSp = w / (cols + 1);
  const rSp = h / (rows + 1);

  const ps = [];
  for (const def of layerDefs) {
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = xMin + (c + 1 + def.ox) * cSp + (Math.random() - 0.5) * cSp * 0.06;
        const y = yMin + (r + 1 + def.oy) * rSp + (Math.random() - 0.5) * rSp * 0.06;
        if (x < xMin || x > xMax || y < yMin || y > yMax) continue;
        const p = makeParticle(type, x, y, true);
        p.alpha  = def.alpha;
        p.scale  = def.scale;
        p.dAlpha = 0;
        ps.push(p);
      }
    }
  }
  return ps;
}

function generateRandom(type, count) {
  return Array.from({ length: count }, () => {
    const pos = spawnPos();
    return makeParticle(type, pos.x, pos.y, false);
  });
}

// ─── Mode init ────────────────────────────────────────────────────────────────
function initMode(mode) {
  currentMode = mode;
  particles   = [];
  switch (mode) {
    case 'copper':
      particles.push(...generateLattice('cu', 110), ...generateRandom('electron', 240)); break;
    case 'tin':
      particles.push(...generateLattice('sn_metal', 110), ...generateRandom('electron', 240)); break;
    case 'nacl':
      particles.push(...generateRandom('water', 80),
                     ...generateRandom('na_plus', 45), ...generateRandom('cl_minus', 45)); break;
    case 'sncl2':
      particles.push(...generateRandom('water', 80),
                     ...generateRandom('sn_plus', 35), ...generateRandom('cl_minus', 70)); break;
    case 'water':
      particles.push(...generateRandom('water', 150),
                     ...generateRandom('h_plus', 8),   ...generateRandom('oh_minus', 8)); break;
  }
}

// ─── Physics ──────────────────────────────────────────────────────────────────
function step() {
  const xLeft  = ELEC_DEPTH;
  const xRight = W - ELEC_DEPTH;
  const yMin   = isMetal() ? metalTop() : contTop();
  const yMax   = isMetal() ? metalBot() : contBot();
  const eS     = eStrength();
  const efac   = currentMode === 'water' ? WATER_EFAC : 1.0;

  for (const p of particles) {
    // Update orbital electrons — random walk on sphere surface
    for (const orb of p.orbitals) {
      // Lateral turn axis = n × t (perpendicular to both position and velocity)
      const cx = orb.ny*orb.tz - orb.nz*orb.ty;
      const cy = orb.nz*orb.tx - orb.nx*orb.tz;
      const cz = orb.nx*orb.ty - orb.ny*orb.tx;
      // Random lateral kick rotates velocity left/right on sphere surface
      const turn = (Math.random() - 0.5) * 0.22;
      orb.tx += cx * turn; orb.ty += cy * turn; orb.tz += cz * turn;
      // Normalize velocity and restore speed
      let tLen = Math.sqrt(orb.tx*orb.tx + orb.ty*orb.ty + orb.tz*orb.tz) || 1;
      orb.tx = orb.tx/tLen * orb.speed;
      orb.ty = orb.ty/tLen * orb.speed;
      orb.tz = orb.tz/tLen * orb.speed;
      // Move position along sphere
      orb.nx += orb.tx; orb.ny += orb.ty; orb.nz += orb.tz;
      // Renormalize to unit sphere
      let nLen = Math.sqrt(orb.nx*orb.nx + orb.ny*orb.ny + orb.nz*orb.nz) || 1;
      orb.nx /= nLen; orb.ny /= nLen; orb.nz /= nLen;
      // Re-orthogonalize velocity to sphere surface
      const dot = orb.tx*orb.nx + orb.ty*orb.ny + orb.tz*orb.nz;
      orb.tx -= dot*orb.nx; orb.ty -= dot*orb.ny; orb.tz -= dot*orb.nz;
    }

    if (p.fixed) {
      p.vx += (p.homeX - p.x) * RESTORE_K + (Math.random() - 0.5) * p.thermal;
      p.vy += (p.homeY - p.y) * RESTORE_K + (Math.random() - 0.5) * p.thermal;
      p.vx *= DAMP; p.vy *= DAMP;
      p.x  += p.vx; p.y  += p.vy;
      continue;
    }

    p.vx += p.charge * eS * efac + (Math.random() - 0.5) * p.thermal;
    p.vy += (Math.random() - 0.5) * p.thermal;
    p.vx *= DAMP; p.vy *= DAMP;
    p.x  += p.vx; p.y  += p.vy;

    // Top / bottom walls
    if (p.y - p.r < yMin) { p.y = yMin + p.r; p.vy =  Math.abs(p.vy); }
    if (p.y + p.r > yMax) { p.y = yMax - p.r; p.vy = -Math.abs(p.vy); }

    // Left — anode face
    if (p.x - p.r < xLeft) {
      if (p.charge < 0) respawn(p);
      else { p.x = xLeft + p.r; p.vx = Math.abs(p.vx); }
    }
    // Right — cathode face
    if (p.x + p.r > xRight) {
      if (p.charge > 0) respawn(p);
      else { p.x = xRight - p.r; p.vx = -Math.abs(p.vx); }
    }

    // Depth alpha drift — all non-fixed particles (fixed atoms use static layer alpha)
    if (p.type === 'electron') {
      // Stochastic rate: jitter dAlpha each frame so speed wanders like thermal motion
      p.dAlpha += (Math.random() - 0.5) * 0.0030;
      const mag = Math.abs(p.dAlpha);
      if (mag < 0.0015) p.dAlpha = p.dAlpha < 0 ? -0.0015 : 0.0015;  // don't stall
      if (mag > 0.0120) p.dAlpha = p.dAlpha < 0 ? -0.0120 : 0.0120;  // don't race
    }
    p.alpha += p.dAlpha;
    if (p.alpha >= ALPHA_MAX) { p.alpha = ALPHA_MAX; p.dAlpha = -Math.abs(p.dAlpha); }
    if (p.alpha <= ALPHA_MIN) { p.alpha = ALPHA_MIN; p.dAlpha =  Math.abs(p.dAlpha); }
  }
}

// ─── Color helpers ────────────────────────────────────────────────────────────
function hexRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function lighten(hex, f) {
  const [r,g,b] = hexRgb(hex);
  return `rgb(${Math.min(255,Math.round(r+255*f))},${Math.min(255,Math.round(g+255*f))},${Math.min(255,Math.round(b+255*f))})`;
}
function darken(hex, f) {
  const [r,g,b] = hexRgb(hex);
  return `rgb(${Math.max(0,Math.round(r-255*f))},${Math.max(0,Math.round(g-255*f))},${Math.max(0,Math.round(b-255*f))})`;
}

// ─── Particle image cache (no glow) ──────────────────────────────────────────
const _imgCache = {};

function getImg(type) {
  if (_imgCache[type]) return _imgCache[type];
  const d    = PTYPES[type];
  const r    = d.r;
  const pad  = 2;
  const size = (r + pad) * 2;
  const oc   = document.createElement('canvas');
  oc.width = oc.height = size;
  const ot = oc.getContext('2d');
  const cx = size / 2, cy = size / 2;

  if (type === 'water') {
    // Simple translucent blue circle
    const g = ot.createRadialGradient(cx - r*0.25, cy - r*0.25, 0, cx, cy, r);
    g.addColorStop(0,   'rgba(165,215,248,0.65)');
    g.addColorStop(0.6, 'rgba(110,175,228,0.42)');
    g.addColorStop(1,   'rgba(80,140,205,0.10)');
    ot.fillStyle = g;
    ot.beginPath(); ot.arc(cx, cy, r, 0, Math.PI * 2); ot.fill();
  } else if (type === 'electron') {
    // Flat solid — no gradient, no blur; drawn via arc() in drawParticles instead
    // (cache not used for electrons)
  } else {
    const hex = d.hex;
    // Core sphere — highlight + body + shadow, no outer glow
    const gCore = ot.createRadialGradient(cx - r * 0.3, cy - r * 0.32, 0, cx, cy, r);
    gCore.addColorStop(0,    lighten(hex, 0.50));
    gCore.addColorStop(0.42, hex);
    gCore.addColorStop(1,    darken(hex, 0.42));
    ot.fillStyle = gCore;
    ot.beginPath(); ot.arc(cx, cy, r, 0, Math.PI * 2); ot.fill();

    // Label for larger particles
    if (r >= 8 && d.label) {
      const fs = Math.max(7, Math.min(10, r * 0.78));
      ot.font = `600 ${fs}px Lexend, sans-serif`;
      ot.textAlign = 'center'; ot.textBaseline = 'middle';
      ot.fillStyle = 'rgba(255,255,255,0.88)';
      ot.fillText(d.label, cx, cy);
    }
  }

  _imgCache[type] = oc;
  return oc;
}

// ─── Draw order ───────────────────────────────────────────────────────────────
const DRAW_ORDER = ['water','cu','sn_metal','oh_minus','h_plus','na_plus','cl_minus','sn_plus','electron'];

const ER = PTYPES.electron.r;  // electron draw radius (2px)
const N_EBUCKETS = 8;
const _eBuckets  = Array.from({length: N_EBUCKETS}, () => []);

function drawParticles() {
  const byType = {};
  for (const p of particles) (byType[p.type] || (byType[p.type] = [])).push(p);

  // Draw non-electron particle types via offscreen image cache
  for (const type of DRAW_ORDER) {
    if (type === 'electron') continue;
    const grp = byType[type];
    if (!grp) continue;
    const img      = getImg(type);
    const baseHalf = img.width / 2;
    for (const p of grp) {
      ctx.globalAlpha = p.alpha;
      const half = baseHalf * (p.scale ?? 1);
      ctx.drawImage(img, p.x - half, p.y - half, half * 2, half * 2);
    }
  }
  ctx.globalAlpha = 1;

  // Draw all electrons (free + orbital) as flat solid arc() — crisp, no blur
  ctx.fillStyle = '#ffee00';

  // Free electrons — bucketed by alpha (8 buckets → 8 fills instead of 240)
  const freeElec = byType['electron'];
  if (freeElec) {
    for (let i = 0; i < N_EBUCKETS; i++) _eBuckets[i].length = 0;
    for (const p of freeElec) {
      const bi = Math.min(N_EBUCKETS - 1,
        Math.floor((p.alpha - ALPHA_MIN) / (ALPHA_MAX - ALPHA_MIN) * N_EBUCKETS));
      _eBuckets[bi].push(p);
    }
    for (let i = 0; i < N_EBUCKETS; i++) {
      if (!_eBuckets[i].length) continue;
      ctx.globalAlpha = ALPHA_MIN + (i + 0.5) / N_EBUCKETS * (ALPHA_MAX - ALPHA_MIN);
      ctx.beginPath();
      for (const p of _eBuckets[i]) {
        ctx.moveTo(p.x + ER, p.y);
        ctx.arc(p.x, p.y, ER, 0, Math.PI * 2);
      }
      ctx.fill();
    }
  }

  // Orbital electrons — per-ion two-pass (back dim, front full) × parent alpha
  ctx.fillStyle = '#ffee00';
  for (const type of DRAW_ORDER) {
    if (type === 'electron') continue;
    const grp = byType[type]; if (!grp) continue;
    for (const p of grp) {
      if (!p.orbitals.length) continue;
      // Back hemisphere: parent alpha × 0.30
      ctx.globalAlpha = p.alpha * 0.30;
      ctx.beginPath();
      for (const orb of p.orbitals) {
        if (orb.nz > 0) continue;
        const ox = p.x + orb.nx * orb.r, oy = p.y + orb.ny * orb.r;
        ctx.moveTo(ox + ER, oy); ctx.arc(ox, oy, ER, 0, Math.PI * 2);
      }
      ctx.fill();
      // Front hemisphere: parent alpha × 1.0
      ctx.globalAlpha = p.alpha;
      ctx.beginPath();
      for (const orb of p.orbitals) {
        if (orb.nz <= 0) continue;
        const ox = p.x + orb.nx * orb.r, oy = p.y + orb.ny * orb.r;
        ctx.moveTo(ox + ER, oy); ctx.arc(ox, oy, ER, 0, Math.PI * 2);
      }
      ctx.fill();
    }
  }
}

// ─── Draw electrodes (solid color, flush with walls, protruding inward) ───────
const ANODE_COL   = '#b83018';
const CATHODE_COL = '#1844aa';

function drawElectrodes() {
  const eT = metalTop(), eB = metalBot(), eH = eB - eT;

  // Anode: x=0 to ELEC_DEPTH
  ctx.fillStyle = ANODE_COL;
  ctx.fillRect(0, eT, ELEC_DEPTH, eH);

  // Cathode: x=W-ELEC_DEPTH to W
  ctx.fillStyle = CATHODE_COL;
  ctx.fillRect(W - ELEC_DEPTH, eT, ELEC_DEPTH, eH);

  // Clean inner edges
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(ELEC_DEPTH, eT); ctx.lineTo(ELEC_DEPTH, eB); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W - ELEC_DEPTH, eT); ctx.lineTo(W - ELEC_DEPTH, eB); ctx.stroke();

  // Charge labels (above electrode)
  ctx.font = '600 22px Lexend, sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillStyle = ANODE_COL;
  ctx.textAlign = 'center';
  ctx.fillText('+', ELEC_DEPTH / 2, eT - 8);
  ctx.fillStyle = CATHODE_COL;
  ctx.fillText('−', W - ELEC_DEPTH / 2, eT - 8);

  // Name labels (below electrode)
  ctx.font = '400 11px Lexend, sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(190,110,80,0.75)';
  ctx.fillText('Anode', ELEC_DEPTH / 2, eB + 8);
  ctx.fillStyle = 'rgba(80,110,200,0.75)';
  ctx.fillText('Cathode', W - ELEC_DEPTH / 2, eB + 8);
}

// ─── Draw container ───────────────────────────────────────────────────────────
function drawContainer() {
  const cB = contBot();

  // Metal band tint (Cu/Sn modes)
  if (isMetal()) {
    ctx.fillStyle = 'rgba(255,200,120,0.04)';
    ctx.fillRect(ELEC_DEPTH, metalTop(), W - 2 * ELEC_DEPTH, metalBot() - metalTop());
  } else {
    // Aqueous tint
    ctx.fillStyle = 'rgba(36,72,160,0.07)';
    ctx.fillRect(0, contTop(), W, contH());
  }

  // Container bottom line
  ctx.strokeStyle = 'rgba(170,190,215,0.38)';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(0, cB); ctx.lineTo(W, cB); ctx.stroke();
}

// ─── E-field arrows ───────────────────────────────────────────────────────────
function drawFieldArrows() {
  const xL = ELEC_DEPTH, xR = W - ELEC_DEPTH;
  const eT = metalTop(), eB = metalBot();
  const nRows = 5, segLen = 34, headSz = 5, gap = 90;

  ctx.save();
  ctx.globalAlpha = 0.09;
  for (let i = 0; i < nRows; i++) {
    const y = eT + (i + 0.5) / nRows * (eB - eT);
    let x = xL + 30;
    while (x + segLen < xR - 10) {
      const t = (x - xL) / (xR - xL);
      const r1 = hexRgb('#cc3018'), r2 = hexRgb('#1844aa');
      const col = `rgb(${Math.round(r1[0]+(r2[0]-r1[0])*t)},${Math.round(r1[1]+(r2[1]-r1[1])*t)},${Math.round(r1[2]+(r2[2]-r1[2])*t)})`;
      ctx.strokeStyle = ctx.fillStyle = col;
      ctx.lineWidth = 1.3;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + segLen, y); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + segLen, y);
      ctx.lineTo(x + segLen - headSz, y - headSz * 0.42);
      ctx.lineTo(x + segLen - headSz, y + headSz * 0.42);
      ctx.closePath(); ctx.fill();
      x += segLen + gap;
    }
  }
  ctx.restore();
}

// ─── Power supply & wires ─────────────────────────────────────────────────────
function drawWires() {
  const ps   = psRect();
  const aCX  = ELEC_DEPTH / 2;
  const cCX  = W - ELEC_DEPTH / 2;
  const yBot = contBot();
  const termY = ps.y + ps.h / 2;

  ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  // Anode wire (warm)
  ctx.strokeStyle = '#aa3014';
  ctx.beginPath();
  ctx.moveTo(aCX, metalBot());
  ctx.lineTo(aCX, termY);
  ctx.lineTo(ps.x + 24, termY);
  ctx.stroke();

  // Cathode wire (blue)
  ctx.strokeStyle = '#183898';
  ctx.beginPath();
  ctx.moveTo(cCX, metalBot());
  ctx.lineTo(cCX, termY);
  ctx.lineTo(ps.x + ps.w - 24, termY);
  ctx.stroke();

  // Terminal dots
  ctx.fillStyle = '#aa3014';
  ctx.beginPath(); ctx.arc(ps.x + 24, termY, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#183898';
  ctx.beginPath(); ctx.arc(ps.x + ps.w - 24, termY, 4, 0, Math.PI * 2); ctx.fill();
}

function drawPowerSupply() {
  const ps = psRect();

  // Box
  ctx.strokeStyle = 'rgba(255,255,255,0.14)';
  ctx.lineWidth = 1.5;
  ctx.fillStyle = 'rgba(10,8,28,0.6)';
  ctx.beginPath();
  ctx.roundRect(ps.x, ps.y, ps.w, ps.h, 10);
  ctx.fill(); ctx.stroke();

  // Dial ─────────────────────────────────────────────────────────────────────
  const cx = dialCX(), cy = dialCY(), r = DIAL_R;
  const t = (voltage - V_MIN) / (V_MAX - V_MIN);
  const startA  =  Math.PI * 0.75;          // 7 o'clock
  const sweep   =  Math.PI * 1.5;           // 270°
  const needleA =  startA + t * sweep;

  // Track arc
  ctx.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx.lineWidth   = 4;
  ctx.beginPath(); ctx.arc(cx, cy, r - 2, startA, startA + sweep); ctx.stroke();

  // Value arc
  ctx.strokeStyle = '#ffee00';
  ctx.lineWidth   = 4;
  ctx.beginPath(); ctx.arc(cx, cy, r - 2, startA, needleA); ctx.stroke();

  // Dial ring
  ctx.strokeStyle = 'rgba(255,255,255,0.20)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();

  // Needle
  ctx.strokeStyle = '#ffee00';
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(needleA) * (r - 7), cy + Math.sin(needleA) * (r - 7));
  ctx.stroke();

  // Center dot
  ctx.fillStyle = 'rgba(255,255,255,0.40)';
  ctx.beginPath(); ctx.arc(cx, cy, 3.5, 0, Math.PI * 2); ctx.fill();

  // "Energy" label
  ctx.font = '400 10px Lexend, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(220,215,255,0.40)';
  ctx.fillText('Energy', cx, cy + r + 6);

  // Readouts (right of dial)
  const rx = cx + r + 22;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';

  ctx.font = '600 20px Lexend, sans-serif';
  ctx.fillStyle = 'rgba(255,238,0,0.85)';
  ctx.fillText(voltage.toFixed(1) + ' V', rx, cy - 9);

  ctx.font = '400 13px Lexend, sans-serif';
  ctx.fillStyle = 'rgba(180,200,255,0.70)';
  ctx.fillText(fmtCurrent(getCurrent()), rx, cy + 12);

  // Terminal labels
  ctx.font = '500 10px Lexend, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#aa3014';
  ctx.fillText('+', ps.x + 24, ps.y + ps.h / 2 - 12);
  ctx.fillStyle = '#183898';
  ctx.fillText('−', ps.x + ps.w - 24, ps.y + ps.h / 2 - 12);
}

// ─── Main draw ────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#05040f';
  ctx.fillRect(0, 0, W, H);

  drawContainer();
  drawElectrodes();
  drawWires();
  drawPowerSupply();
  drawParticles();
}

// ─── Animation loop ───────────────────────────────────────────────────────────
function loop() { step(); draw(); requestAnimationFrame(loop); }

// ─── Dial interaction ─────────────────────────────────────────────────────────
let dialDragging = false, dialDragY0 = 0, dialV0 = 5.0;

canvas.addEventListener('mousedown', e => {
  const dx = e.clientX - dialCX(), dy = e.clientY - dialCY();
  if (Math.hypot(dx, dy) <= DIAL_R + 18) {
    dialDragging = true; dialDragY0 = e.clientY; dialV0 = voltage;
    e.preventDefault();
  }
});
canvas.addEventListener('mousemove', e => {
  if (!dialDragging) return;
  const delta = (dialDragY0 - e.clientY) / 5.5;
  voltage = Math.max(V_MIN, Math.min(V_MAX, dialV0 + delta));
});
window.addEventListener('mouseup', () => { dialDragging = false; });

// ─── Mode buttons ─────────────────────────────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    initMode(btn.dataset.mode);
  });
});

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => { resize(); initMode(currentMode); });
resize();
initMode('copper');
loop();
</script>
</body>
